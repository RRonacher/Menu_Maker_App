{% extends 'base.html' %}

{% block title %}Recipe - Menu Maker{% endblock %}

{% block content %}
  <div class="card-soft mx-auto" style="max-width:760px;">
    <h2 class="h4">Recipe Form</h2>
    <form method="post" class="mt-4">
      <div class="mb-3">
        <label for="title" class="form-label">Recipe Title*</label>
        <input type="text" class="form-control" id="title" name="title" required>
      </div>
      
      <div class="mb-3">
        <label for="url" class="form-label">Recipe URL*</label>
        <input type="url" class="form-control" id="url" name="url" required>
      </div>
      
      <div class="mb-3">
        <label for="source" class="form-label">Source*</label>
        <input type="text" class="form-control" id="source" name="source" required>
      </div>
      
      <h6 class="text-muted mb-3">Nutritional Information (per serving)</h6>
      <div class="row g-3 mb-3">
        <div class="col-md-6 col-lg-3">
          <label for="calories" class="form-label">Calories*</label>
          <input type="text" inputmode="numeric" class="form-control" id="calories" name="calories" pattern="[0-9]+" required>
        </div>
        
        <div class="col-md-6 col-lg-3">
          <label for="carbs" class="form-label">Carbs (g)*</label>
          <input type="text" class="form-control" id="carbs" name="carbs" pattern="[0-9]*\.?[0-9]*" required>
        </div>
        
        <div class="col-md-6 col-lg-3">
          <label for="protein" class="form-label">Protein (g)*</label>
          <input type="text" class="form-control" id="protein" name="protein" pattern="[0-9]*\.?[0-9]*" required>
        </div>
        
        <div class="col-md-6 col-lg-3">
          <label for="fat" class="form-label">Fat (g)*</label>
          <input type="text" class="form-control" id="fat" name="fat" pattern="[0-9]*\.?[0-9]*" required>
        </div>
      </div>
      
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">Submit Recipe</button>
        <a href="/" class="btn btn-outline-secondary">Back to Home</a>
      </div>
    </form>
  </div>
  
  <script>
      // Basic client-side validation
    document.querySelector('form').addEventListener('submit', function(e) {
      const intFields = ['calories'];
      const floatFields = ['carbs', 'protein', 'fat'];
      let valid = true;

      intFields.forEach(field => {
        const value = document.getElementById(field).value.trim();
        if (!/^\d+$/.test(value) || parseInt(value, 10) <= 0) {
          valid = false;
          alert(`${field.charAt(0).toUpperCase() + field.slice(1)} must be a positive integer`);
        }
      });

      floatFields.forEach(field => {
        const value = document.getElementById(field).value.trim();
        if (!/^\d+(?:\.\d+)?$/.test(value) || parseFloat(value) <= 0) {
          valid = false;
          alert(`${field.charAt(0).toUpperCase() + field.slice(1)} must be a positive number`);
        }
      });
      
      let url = document.getElementById('url').value.trim();
      // Add https:// if no protocol is specified
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
      }
      try {
        const urlObj = new URL(url);
        // Update the form value with potentially added protocol
        document.getElementById('url').value = url;
      } catch {
        valid = false;
        alert('Please enter a valid URL (e.g., www.example.com or https://example.com)');
      }
      
      if (!valid) {
        e.preventDefault();
      }
    });
  </script>
{% endblock %}
